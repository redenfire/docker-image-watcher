services:
  freellmapi:
    image: ghcr.io/tashfeenahmed/freellmapi:latest
    container_name: freellmapi
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      ENCRYPTION_KEY: ${FREELLMAPI_ENCRYPTION_KEY:?set FREELLMAPI_ENCRYPTION_KEY}
    volumes:
      - freellmapi-data:/app/server/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/v1/models').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  freellmapi-data:

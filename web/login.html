<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login { background: #1e293b; border-radius: 8px; padding: 32px; width: 100%; max-width: 360px; }
.login h1 { font-size: 1.2rem; margin-bottom: 24px; text-align: center; color: #e2e8f0; }
.login label { display: block; font-size: .8rem; color: #94a3b8; margin-bottom: 4px; }
.login input { width: 100%; padding: 10px 12px; border: 1px solid #334155; border-radius: 6px; background: #0f172a; color: #e2e8f0; font-size: .9rem; margin-bottom: 16px; outline: 0; }
.login input:focus { border-color: #3b82f6; }
.login .btn { width: 100%; padding: 10px; border: 0; border-radius: 6px; background: #2563eb; color: #fff; font-size: .9rem; font-weight: 500; cursor: pointer; }
.login .btn:hover { background: #1d4ed8; }
.login .error { color: #ef4444; font-size: .8rem; margin-top: 12px; text-align: center; display: none; }
</style>
</head>
<body>
<div class="login">
  <h1>🐳 Docker Image Watcher</h1>
  <form id="loginForm">
    <label for="user">Username</label>
    <input type="text" id="user" name="user" autocomplete="username" required autofocus>
    <label for="pass">Password</label>
    <input type="password" id="pass" name="pass" autocomplete="current-password" required>
    <button type="submit" class="btn">Login</button>
    <div class="error" id="error">Invalid credentials</div>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;
  const err = document.getElementById('error');
  err.style.display = 'none';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, pass })
    });
    if (res.ok) { window.location.href = '/'; return; }
    const data = await res.json();
    err.textContent = data.error || 'Invalid credentials';
  } catch(_) { err.textContent = 'Connection error'; }
  err.style.display = 'block';
});
</script>
</body>
</html>

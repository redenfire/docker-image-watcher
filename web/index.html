<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Docker Image Watcher</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
h1 { font-size: 1.5rem; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
h1 small { font-size: .75rem; color: #64748b; font-weight: 400; }
table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #334155; }
th { background: #334155; font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: #94a3b8; }
tr:last-child td { border: 0; }
td { font-size: .875rem; font-family: "SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace; }
.group-row td { border-bottom: 0; padding-bottom: 2px; background: #1a2333; }
.group-row + .child-row td { padding-top: 2px; }
.child-row td:first-child { padding-left: 28px; }
.child-row:last-child td { border-bottom: 1px solid #334155; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .75rem; font-weight: 600; }
.badge-uptodate { background: #064e3b; color: #6ee7b7; }
.badge-outdated { background: #7c2d12; color: #fdba74; }
.badge-partial { background: #713f12; color: #fcd34d; }
.badge-unknown { background: #1e293b; color: #94a3b8; border: 1px solid #475569; }
.btn { padding: 6px 14px; border: 0; border-radius: 6px; cursor: pointer; font-size: .8rem; font-weight: 500; transition: opacity .15s; display: inline-flex; align-items: center; gap: 4px; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-update { background: #2563eb; color: #fff; }
.btn-update:hover:not(:disabled) { background: #1d4ed8; }
.btn-group { background: #7c3aed; color: #fff; }
.btn-group:hover:not(:disabled) { background: #6d28d9; }
.progress-cell { min-width: 160px; }
.progress-bar { display: flex; align-items: center; gap: 6px; font-size: .75rem; }
.progress-bar .bar { flex: 1; height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
.progress-bar .bar .fill { height: 100%; background: #22c55e; border-radius: 3px; transition: width .3s; }
.progress-bar .pct { color: #94a3b8; min-width: 28px; text-align: right; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #94a3b8; border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toggle { position: relative; width: 40px; height: 22px; background: #475569; border-radius: 11px; cursor: pointer; transition: background .2s; }
.toggle.on { background: #059669; }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: transform .2s; }
.toggle.on::after { transform: translateX(18px); }
.digest { color: #94a3b8; font-size: .8rem; }
.status-bar { margin-top: 12px; font-size: .8rem; color: #64748b; display: flex; gap: 16px; }
.status-bar .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.dot-green { background: #22c55e; }
.dot-red { background: #ef4444; }
.dot-yellow { background: #eab308; }
.dot-gray { background: #64748b; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
.checking .dot { animation: pulse 1.5s infinite; }
.empty { padding: 40px; text-align: center; color: #64748b; }
.empty p { margin-top: 8px; font-size: .85rem; }
.name-cell { max-width: 300px; overflow: hidden; text-overflow: ellipsis; }
.container-name { color: #94a3b8; }
</style>
</head>
<body>
<h1>🐳 <span id="appTitle">Docker Image Watcher</span> <small id="status"></small> <span style="margin-left:auto;display:flex;align-items:center;gap:8px"><a href="#" id="langSwitch" style="color:#64748b;text-decoration:none;font-size:.75rem" onclick="switchLang();return false">IT</a><a href="#" id="logoutLink" style="color:#ef4444;text-decoration:none;font-size:.75rem" onclick="doLogout();return false">Logout</a><label style="font-size:.8rem;font-weight:400;display:flex;align-items:center;gap:6px;cursor:pointer"><span id="hideLabel">Hide up to date</span> <div class="toggle on" id="hideToggle"></div></label></span></h1>
<table><thead><tr>
<th id="thImage">Image / Container</th><th id="thDigest">Digest</th><th id="thStatus">Status</th><th id="thAuto">Auto</th><th></th>
</tr></thead><tbody id="rows"></tbody></table>
<div class="status-bar" id="bar">
<span id="counts"></span>
<span id="lastCheck"></span>
</div>

<script>
const POLL = 10000;
let updating = new Set();
let showAll = false;

let lang = (navigator.language || 'en').startsWith('it') ? 'it' : 'en';
document.getElementById('langSwitch').textContent = lang === 'en' ? 'IT' : 'EN';

const i18n = {
  en: {
    title: 'Docker Image Watcher',
    hide: 'Hide up to date',
    image: 'Image / Container',
    digest: 'Digest',
    status: 'Status',
    auto: 'Auto',
    checking: '⏳ checking...',
    images: n => `✅ ${n} images`,
    error: '❌ connection error',
    empty: 'No running containers found',
    emptyHint: 'Make sure the Docker socket is mounted and containers are running',
    uptodate: '✅ Up to date',
    outdated: '🔄 Update available',
    partial: '⚠️ Partial',
    unknown: '❓ Unknown',
    update: 'Update',
    updateAll: (n) => `Update all (${n})`,
    lastCheck: 'Last check: ',
    upToDate: 'up to date',
    outdatedLabel: 'outdated',
    partialLabel: 'partial',
    unknownLabel: 'unknown',
    connecting: 'connecting...',
    errorLabel: 'Error',
    updatingLabel: '⏳ updating...',
    recreating: 'recreating',
    noProgress: 'no progress',
    logout: 'Logout',
  },
  it: {
    title: 'Docker Image Watcher',
    hide: 'Nascondi aggiornati',
    image: 'Immagine / Container',
    digest: 'Digest',
    status: 'Stato',
    auto: 'Auto',
    checking: '⏳ controllo...',
    images: n => `✅ ${n} immagini`,
    error: '❌ errore di connessione',
    empty: 'Nessun container in esecuzione',
    emptyHint: 'Assicurati che il socket Docker sia montato e che i container siano attivi',
    uptodate: '✅ Aggiornato',
    outdated: '🔄 Aggiornamento disp.',
    partial: '⚠️ Parziale',
    unknown: '❓ Sconosciuto',
    update: 'Aggiorna',
    updateAll: (n) => `Aggiorna tutti (${n})`,
    lastCheck: 'Ultimo controllo: ',
    upToDate: 'aggiornati',
    outdatedLabel: 'da aggiornare',
    partialLabel: 'parziali',
    unknownLabel: 'sconosciuti',
    connecting: 'connessione...',
    errorLabel: 'Errore',
    updatingLabel: '⏳ aggiornamento...',
    recreating: 'ricreazione',
    noProgress: 'nessun progresso',
    logout: 'Esci',
  }
};

const t = new Proxy({}, { get: (_, k) => { const v = i18n[lang][k]; return typeof v === 'function' ? (...a) => v(...a) : v; } });
document.title = i18n[lang].title;

document.getElementById('hideToggle').addEventListener('click', function() {
  this.classList.toggle('on');
  showAll = !this.classList.contains('on');
  load();
});

function applyL10N() {
  document.getElementById('appTitle').textContent = t.title;
  document.getElementById('hideLabel').textContent = t.hide;
  document.getElementById('thImage').textContent = t.image;
  document.getElementById('thDigest').textContent = t.digest;
  document.getElementById('thStatus').textContent = t.status;
  document.getElementById('thAuto').textContent = t.auto;
  document.getElementById('logoutLink').textContent = t.logout;
}

async function load() {
  const bar = document.getElementById('status');
  bar.textContent = t.checking;
  bar.parentElement.classList.add('checking');
  try {
    const res = await fetch('/api/images');
    const groups = await res.json();
    render(groups);
    bar.textContent = t.images(groups.length);
  } catch(e) {
    bar.textContent = t.error;
  }
  bar.parentElement.classList.remove('checking');
}

function render(groups) {
  const tbody = document.getElementById('rows');
  const counts = { uptodate: 0, outdated: 0, unknown: 0, partial: 0 };
  let html = '';
  if (groups.length === 0) {
    html = '<tr><td colspan="5"><div class="empty">' + esc(t.empty) + '<br><p>' + esc(t.emptyHint) + '</p></div></td></tr>';
  } else {
    for (const g of groups) {
      if (!showAll && g.status === 'uptodate') continue;
      counts[g.status] = (counts[g.status] || 0) + 1;
      const gBadgeClass = 'badge-' + g.status;
      const badgeMap = { uptodate: t.uptodate, outdated: t.outdated, partial: t.partial, unknown: t.unknown };
      const gBadgeLabel = badgeMap[g.status] || g.status;
      const total = g.containers.length;
      const outdated = g.containers.filter(c => c.status === 'outdated').length;
      const outdatedCids = g.containers.filter(c => c.status === 'outdated').map(c => c.container_id);
      html += `<tr class="group-row">
        <td class="name-cell"><strong>${esc(g.image)}</strong></td>
        <td class="digest">${esc(g.remote_digest)}</td>
        <td><span class="badge ${gBadgeClass}">${gBadgeLabel}</span></td>
        <td></td>
        <td>${outdated > 0 ? `<button class="btn btn-group" data-image="${esc(g.image)}" data-cids="${esc(outdatedCids.join(','))}" onclick="doGroupUpdate(this)">${esc(t.updateAll(total))}</button>` : ''}</td>
      </tr>`;
      for (const c of g.containers) {
        if (!showAll && c.status === 'uptodate') continue;
        const isUpdating = updating.has(c.container_id);
        html += `<tr class="child-row">
          <td class="name-cell"><span class="container-name">├─ ${esc(c.container_name)}</span></td>
          <td class="digest">${esc(c.local_digest)}</td>
          <td></td>
          <td><div class="toggle ${c.auto_update ? 'on' : ''}" data-cid="${esc(c.container_id)}" onclick="toggle(this)"></div></td>
          <td><div class="progress-cell" id="progress-${esc(c.container_id)}">${isUpdating ? '<div class="progress-bar"><div class="bar"><div class="fill" style="width:0%"></div></div><span class="pct">0%</span></div>' : `<button class="btn btn-update" data-cid="${esc(c.container_id)}" onclick="doUpdate(this)" ${c.status !== 'outdated' ? 'disabled' : ''}>${esc(t.update)}</button>`}</div></td>
        </tr>`;
      }
    }
  }
  tbody.innerHTML = html;
  document.getElementById('counts').innerHTML = `
    <span><span class="dot dot-green"></span>${counts.uptodate || 0} ${esc(t.upToDate)}</span>
    <span><span class="dot dot-red"></span>${counts.outdated || 0} ${esc(t.outdatedLabel)}</span>
    <span><span class="dot dot-yellow"></span>${counts.partial || 0} ${esc(t.partialLabel)}</span>
    <span><span class="dot dot-gray"></span>${counts.unknown || 0} ${esc(t.unknownLabel)}</span>`;
  document.getElementById('lastCheck').textContent = t.lastCheck + new Date().toLocaleTimeString();
}

async function toggle(el) {
  const cid = el.dataset.cid;
  el.classList.toggle('on');
  try {
    const res = await fetch(`/api/images/${cid}/auto-update`, { method: 'POST' });
    const data = await res.json();
    el.classList.toggle('on', data.auto_update);
  } catch(e) {
    el.classList.toggle('on');
  }
}

async function doUpdate(btn) {
  const cid = btn.dataset.cid;
  updating.add(cid);
  btn.disabled = true;
  const cell = document.getElementById('progress-' + cid);
  cell.innerHTML = '<div class="progress-bar"><div class="bar"><div class="fill" style="width:0%"></div></div><span class="pct">0%</span></div>';
  try {
    await fetch(`/api/images/${cid}/update`, { method: 'POST' });
    pollProgress(cid);
  } catch(e) {
    cell.innerHTML = esc(t.errorLabel);
  }
}

async function doGroupUpdate(btn) {
  const image = btn.dataset.image;
  const cids = btn.dataset.cids ? btn.dataset.cids.split(',') : [];
  for (const cid of cids) {
    updating.add(cid);
    const cell = document.getElementById('progress-' + cid);
    if (cell) cell.innerHTML = '<div class="progress-bar"><div class="bar"><div class="fill" style="width:0%"></div></div><span class="pct">0%</span></div>';
  }
  btn.disabled = true;
  btn.textContent = t.updatingLabel;
  try {
    await fetch('/api/groups/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image })
    });
    for (const cid of cids) pollProgress(cid);
    setTimeout(load, 2000);
  } catch(e) {
    btn.textContent = t.errorLabel;
  }
}

async function pollProgress(cid) {
  const cell = document.getElementById('progress-' + cid);
  if (!cell) return;
  try {
    const res = await fetch(`/api/images/${cid}/progress`);
    if (!res.ok) { updating.delete(cid); load(); return; }
    const p = await res.json();
    if (p.status === 'error' || p.status === 'recreating') {
      const statusLabel = p.status === 'recreating' ? t.recreating : (p.status.startsWith('error') ? p.status.replace('error: ', t.errorLabel + ': ') : p.status);
      cell.innerHTML = `<div class="progress-bar"><div class="bar"><div class="fill" style="width:${p.percent}%"></div></div><span class="pct">${p.percent}%</span> <span style="color:#94a3b8;font-size:.7rem">${esc(statusLabel)}</span></div>`;
      if (p.status === 'recreating') {
        setTimeout(() => { updating.delete(cid); load(); }, 1000);
        return;
      }
      if (p.status.startsWith('error')) {
        updating.delete(cid); load();
        return;
      }
    } else if (p.status === 'connecting') {
      cell.innerHTML = '<div class="progress-bar"><span class="spinner"></span><span style="color:#94a3b8;font-size:.7rem">' + esc(t.connecting) + '</span></div>';
    } else {
      cell.innerHTML = `<div class="progress-bar"><div class="bar"><div class="fill" style="width:${p.percent}%"></div></div><span class="pct">${p.percent}%</span></div>`;
    }
    if (p.percent < 100) {
      setTimeout(() => pollProgress(cid), 500);
    } else if (p.status !== 'recreating' && !p.status.startsWith('error')) {
      setTimeout(() => pollProgress(cid), 500);
    }
  } catch(e) {
    setTimeout(() => pollProgress(cid), 1000);
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

applyL10N();
load();
setInterval(load, POLL);

fetch('/api/auth/status').then(r => r.json()).then(d => {
  if (!d.enabled) document.getElementById('logoutLink').style.display = 'none';
});

function switchLang() {
  lang = lang === 'en' ? 'it' : 'en';
  document.getElementById('langSwitch').textContent = lang === 'en' ? 'IT' : 'EN';
  document.title = i18n[lang].title;
  applyL10N();
  load();
}

async function doLogout() {
  try { await fetch('/api/logout', { method: 'POST' }); } catch(_) {}
  window.location.href = '/login.html';
}
</script>
</body>
</html>

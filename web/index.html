<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image Watch</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
h1 { font-size: 1.5rem; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
h1 small { font-size: .75rem; color: #64748b; font-weight: 400; }
table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #334155; }
th { background: #334155; font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: #94a3b8; }
tr:last-child td { border: 0; }
td { font-size: .875rem; font-family: "SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: .75rem; font-weight: 600; }
.badge-uptodate { background: #064e3b; color: #6ee7b7; }
.badge-outdated { background: #7c2d12; color: #fdba74; }
.badge-unknown { background: #1e293b; color: #94a3b8; border: 1px solid #475569; }
.btn { padding: 6px 14px; border: 0; border-radius: 6px; cursor: pointer; font-size: .8rem; font-weight: 500; transition: opacity .15s; display: inline-flex; align-items: center; gap: 4px; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-update { background: #2563eb; color: #fff; }
.btn-update:hover:not(:disabled) { background: #1d4ed8; }
.progress-cell { min-width: 160px; }
.progress-bar { display: flex; align-items: center; gap: 6px; font-size: .75rem; }
.progress-bar .bar { flex: 1; height: 6px; background: #334155; border-radius: 3px; overflow: hidden; }
.progress-bar .bar .fill { height: 100%; background: #22c55e; border-radius: 3px; transition: width .3s; }
.progress-bar .pct { color: #94a3b8; min-width: 28px; text-align: right; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #94a3b8; border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.toggle { position: relative; width: 40px; height: 22px; background: #475569; border-radius: 11px; cursor: pointer; transition: background .2s; }
.toggle.on { background: #059669; }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: transform .2s; }
.toggle.on::after { transform: translateX(18px); }
.digest { color: #94a3b8; font-size: .8rem; }
.status-bar { margin-top: 12px; font-size: .8rem; color: #64748b; display: flex; gap: 16px; }
.status-bar .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
.dot-green { background: #22c55e; }
.dot-red { background: #ef4444; }
.dot-gray { background: #64748b; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
.checking .dot { animation: pulse 1.5s infinite; }
.empty { padding: 40px; text-align: center; color: #64748b; }
.empty p { margin-top: 8px; font-size: .85rem; }
</style>
</head>
<body>
<h1>🐳 Image Watch <small id="status"></small> <label style="margin-left:auto;font-size:.8rem;font-weight:400;display:flex;align-items:center;gap:6px;cursor:pointer">Hide up to date <div class="toggle on" id="hideToggle"></div></label></h1>
<table><thead><tr>
<th>Container</th><th>Image</th><th>Local</th><th>Remote</th><th>Status</th><th>Auto</th><th></th>
</tr></thead><tbody id="rows"></tbody></table>
<div class="status-bar" id="bar">
<span id="counts"></span>
<span id="lastCheck"></span>
</div>

<script>
const POLL = 10000;
let updating = new Set();
let showAll = false;

document.getElementById('hideToggle').addEventListener('click', function() {
  this.classList.toggle('on');
  showAll = this.classList.contains('on');
  load();
});

async function load() {
  const bar = document.getElementById('status');
  bar.textContent = '⏳ checking...';
  bar.parentElement.classList.add('checking');
  try {
    const res = await fetch('/api/images');
    const images = await res.json();
    render(images);
    bar.textContent = `✅ ${images.length} images`;
  } catch(e) {
    bar.textContent = '❌ connection error';
  }
  bar.parentElement.classList.remove('checking');
}

function render(images) {
  const tbody = document.getElementById('rows');
  const counts = { uptodate: 0, outdated: 0, unknown: 0 };
  let html = '';
  if (images.length === 0) {
    html = '<tr><td colspan="7"><div class="empty">No running containers found<br><p>Make sure the Docker socket is mounted and containers are running</p></div></td></tr>';
  } else {
    for (const img of images) {
      if (!showAll && img.status === 'uptodate') continue;
      counts[img.status] = (counts[img.status] || 0) + 1;
      const badgeClass = 'badge-' + img.status;
      const badgeLabel = { uptodate: '✅ Up to date', outdated: '🔄 Update available', unknown: '❓ Unknown' }[img.status] || img.status;
      const isUpdating = updating.has(img.container_id);
      html += `<tr>
        <td>${esc(img.container_name)}</td>
        <td style="font-size:.8rem">${esc(img.image)}</td>
        <td class="digest">${esc(img.local_digest)}</td>
        <td class="digest">${esc(img.remote_digest)}</td>
        <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
        <td><div class="toggle ${img.auto_update ? 'on' : ''}" data-cid="${esc(img.container_id)}" onclick="toggle(this)"></div></td>
        <td><div class="progress-cell" id="progress-${esc(img.container_id)}">${isUpdating ? '<div class="progress-bar"><div class="bar"><div class="fill" style="width:0%"></div></div><span class="pct">0%</span></div>' : `<button class="btn btn-update" data-cid="${esc(img.container_id)}" onclick="doUpdate(this)" ${img.status !== 'outdated' ? 'disabled' : ''}>Update</button>`}</div></td></tr>`;
    }
  }
  tbody.innerHTML = html;
  document.getElementById('counts').innerHTML = `
    <span><span class="dot dot-green"></span>${counts.uptodate || 0} up to date</span>
    <span><span class="dot dot-red"></span>${counts.outdated || 0} outdated</span>
    <span><span class="dot dot-gray"></span>${counts.unknown || 0} unknown</span>`;
  document.getElementById('lastCheck').textContent = 'Last check: ' + new Date().toLocaleTimeString();
}

async function toggle(el) {
  const cid = el.dataset.cid;
  el.classList.toggle('on');
  try {
    const res = await fetch(`/api/images/${cid}/auto-update`, { method: 'POST' });
    const data = await res.json();
    el.classList.toggle('on', data.auto_update);
  } catch(e) {
    el.classList.toggle('on');
  }
}

async function doUpdate(btn) {
  const cid = btn.closest('tr').querySelector('.toggle').dataset.cid;
  updating.add(cid);
  btn.disabled = true;
  const cell = document.getElementById('progress-' + cid);
  cell.innerHTML = '<div class="progress-bar"><div class="bar"><div class="fill" style="width:0%"></div></div><span class="pct">0%</span></div>';
  try {
    await fetch(`/api/images/${cid}/update`, { method: 'POST' });
    pollProgress(cid);
  } catch(e) {
    cell.innerHTML = 'Error';
  }
}

async function pollProgress(cid) {
  const cell = document.getElementById('progress-' + cid);
  if (!cell) return;
  try {
    const res = await fetch(`/api/images/${cid}/progress`);
    if (!res.ok) { updating.delete(cid); load(); return; }
    const p = await res.json();
    if (p.status === 'error' || p.status === 'recreating') {
      cell.innerHTML = `<div class="progress-bar"><div class="bar"><div class="fill" style="width:${p.percent}%"></div></div><span class="pct">${p.percent}%</span> <span style="color:#94a3b8;font-size:.7rem">${p.status}</span></div>`;
      if (p.status === 'recreating') {
        setTimeout(() => { updating.delete(cid); load(); }, 1000);
        return;
      }
      if (p.status.startsWith('error')) {
        updating.delete(cid); load();
        return;
      }
    } else if (p.status === 'connecting') {
      cell.innerHTML = '<div class="progress-bar"><span class="spinner"></span><span style="color:#94a3b8;font-size:.7rem">connecting...</span></div>';
    } else {
      cell.innerHTML = `<div class="progress-bar"><div class="bar"><div class="fill" style="width:${p.percent}%"></div></div><span class="pct">${p.percent}%</span></div>`;
    }
    if (p.percent < 100) {
      setTimeout(() => pollProgress(cid), 500);
    } else if (p.status !== 'recreating' && !p.status.startsWith('error')) {
      setTimeout(() => pollProgress(cid), 500);
    }
  } catch(e) {
    setTimeout(() => pollProgress(cid), 1000);
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

load();
setInterval(load, POLL);
</script>
</body>
</html>

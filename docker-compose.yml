services:
  image-watch:
    image: ghcr.io/redenfire/docker-image-watcher:latest
    container_name: image-watch
    restart: unless-stopped
    ports:
      - "8099:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=8080
      - DOCKER_SOCK=/var/run/docker.sock
      # - CHECK_INTERVAL=10m      # default: 10m
      # - CHECK_CONCURRENCY=5     # default: 5
      # - AUTO_COOLDOWN=5m        # default: 5m
      # - AUTH_USER=admin         # uncomment to enable auth
      # - AUTH_PASS=changeme
      # - DOCKER_REGISTRY_AUTH=username:password  # uncomment to avoid Docker Hub unauthenticated pull rate limits